---
preset: web
description: Web application
defaults:
  IMAGE: ""
  PORT: "3000"
  SECRET_NAME: "{{APP_NAME}}-secrets"
  PROBE_PATH: "/api/health"
hints:
  IMAGE: "Container image with tag, e.g. ghcr.io/owner/app:latest"
  PORT: "Port the container listens on"
  SECRET_NAME: "Secret resource name (holds sensitive env vars)"
  PROBE_PATH: "HTTP path for liveness/readiness checks"
optional:
  - SECRET_NAME
  - PROBE_PATH
config: {}
---
# Labels and selectors (app: <name>) are injected by Kustomize commonLabels
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{APP_NAME}}
spec:
  template:
    spec:
      containers:
        - name: {{APP_NAME}}
          image: {{IMAGE}}
          ports:
            - containerPort: {{PORT}}
          envFrom:
            - configMapRef:
                name: {{APP_NAME}}
{{SECRET_ENV_VARS}}
{{PROBES}}
